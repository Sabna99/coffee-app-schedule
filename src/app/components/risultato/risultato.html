<div class="risultato-sezione" [class]="classeExtra()">
  <div class="confetti-container">
    @for (c of confetti(); track $index) {
      <span class="confetto" [style.left.%]="getConfettiLeft($index)" [style.animation-delay.s]="getConfettiDelay($index)">{{ c }}</span>
    }
  </div>
  <div class="risultato-emoji" [class.vittoria-anim]="emoji()">{{ emoji() }}</div>
  <div class="risultato-testo" [class.oro]="classeExtra() === 'vittoria'" [class.errore]="classeExtra() === 'errore'" [class.glow]="classeExtra() === 'vittoria'">{{ testo() }}</div>
  <div class="risultato-sub" [class.verde]="classeExtra() === 'vittoria'">{{ sottotesto() }}</div>
</div>
