<div class="app">
  <!-- HEADER -->
  <div class="header">
    <div class="titolo">&#9749; Turno del Caff&#232; &#9749;</div>
    <div class="tazzine">
      <span class="tazzina">&#9749;</span>
      <span class="tazzina">&#9749;</span>
      <span class="tazzina">&#9749;</span>
      <span class="tazzina">&#9749;</span>
      <span class="tazzina">&#9749;</span>
    </div>
  </div>

  <!-- OROLOGIO -->
  <app-orologio />

  <div class="separatore"></div>

  <!-- PRESENTI -->
  <app-presenti />

  <div class="separatore"></div>

  <!-- SORTEGGIO -->
  <app-sorteggio (sorteggioRichiesto)="onSorteggia()" />

  <!-- RISULTATO -->
  <app-risultato
    [emoji]="emoji()"
    [testo]="testo()"
    [sottotesto]="sottotesto()"
    [classeExtra]="classeExtra()"
    [confetti]="confetti()"
  />

  <div class="separatore"></div>

  <div class="classifica-sezione">
    <div class="classifica-titolo">🏁 Classifica dei Baristi Leggendari</div>
    <div class="classifica-sub">Chi ha salvato piu pause caffe finora? ☕</div>
    @for (riga of classifica(); track riga.nome; let i = $index) {
      <div class="classifica-riga">
        <div class="classifica-posizione">#{{ i + 1 }}</div>
        <div class="classifica-nome">{{ riga.nome }}</div>
        <div class="classifica-stat">
          {{ riga.caffeTotali }} ☕ totali
        </div>
      </div>
    }
  </div>

  <!-- RESET -->
  <div class="footer-sezione">
    <button class="btn-reset" (click)="onReset()">&#x1F504; Reset</button>
  </div>

  <!-- ULTIMO VINCITORE -->
  <div class="ultimo-bar">{{ ultimoBar() }}</div>
</div>
